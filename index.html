<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RogueHashrate</title>
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="star-1"></div>
  <div class="star-2"></div>
  <div class="star-3"></div>
  <div class="star-4"></div>
  <div class="star-5"></div>
  <div class="star-6"></div>
  <div class="star-7"></div>
  <div class="star-8"></div>
  <div class="container">
    <img src="assets/roguehashrate.png" alt="roguehashrate-pfp" class="pfp">
    
    <h1>RogueHashrate</h1>
    
    <p class="npub-label">find me on nostr <img src="assets/nostr-icon-white-transparent.svg" alt="nostr" class="nostr-icon"></p>
    
    <p class="npub" id="npub-nostr">
      <span class="npub-full">npub1hs5244d3vle3m5muvmvvjh2qp3jprkpjwhk393gy7cykt50eamrq8f5rx4</span>
      <span class="npub-copied">copied!</span>
    </p>
    
    <p class="npub-label">message me</p>
    
    <div class="links">
      <a href=""https://signal.me/#eu/aQIlI47-gBMiu5AYp-Q0CiX6oIuM27aBjqU61U97uR67eFY_Rf1CK56IiaPFBbUP class="link" target="_blank">Radar.chat (signal)</a>
    </div>
    
    <div class="links">
      <a href="https://jumble.roguehashrate.com" class="link">RogueJumble</a>
      <a href="https://regicide.roguehashrate.com" class="link">Regicide</a>
      <a href="https://pewpew.roguehashrate.com" class="link">PewPew</a>
    </div>

   <div class="links">
    <a href="https://github.com/roguehashrate" class="link" target="_blank">GitHub</a>
  </div>

  <script>
    document.querySelectorAll('.npub').forEach(el => {
      el.addEventListener('click', async () => {
        await navigator.clipboard.writeText(el.querySelector('.npub-full').textContent);
        el.classList.add('copied');
        setTimeout(() => {
          el.classList.remove('copied');
        }, 1500);
      });
    });
  </script>
  </div>
</body>
</html>
